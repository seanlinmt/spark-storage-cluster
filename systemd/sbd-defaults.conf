# /etc/default/sbd — SBD configuration for NVMe-oF cluster
#
# This cluster runs SBD in DISKLESS/WATCHDOG-ONLY mode.
# No SBD_DEVICE is needed — the hardware watchdog provides fencing.
#
# CRITICAL: SBD_OPTS must include -W or SBD will fail to start.
# Without -W, SBD 1.5.2 exits immediately with "sbd failed"
# because it has no device and doesn't auto-enable the watchdog.

SBD_PACEMAKER=yes
SBD_STARTMODE=always
SBD_DELAY_START=no
SBD_WATCHDOG_DEV=/dev/watchdog
SBD_WATCHDOG_TIMEOUT=5
SBD_TIMEOUT_ACTION=flush,reboot
SBD_MOVE_TO_ROOT_CGROUP=auto
SBD_SYNC_RESOURCE_STARTUP=yes
SBD_OPTS="-W"
