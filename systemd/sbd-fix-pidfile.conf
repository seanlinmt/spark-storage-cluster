# Systemd drop-in override for sbd.service
# Fixes: PID file race condition where SBD starts successfully but doesn't
# write /run/sbd.pid fast enough, causing systemd to time out and kill it.
# This cascades to pacemaker.service failing with "Dependency failed".
#
# Install to: /etc/systemd/system/sbd.service.d/override.conf
# Then run:   sudo systemctl daemon-reload

[Service]
# The upstream ExecStart includes -p /run/sbd.pid but SBD's inquisitor
# process never writes it. Replace ExecStart without -p, and instead
# create the PID file ourselves in ExecStartPost.
ExecStart=
ExecStart=/usr/sbin/sbd $SBD_OPTS watch

# After the parent forks and exits, find the inquisitor child and write
# the PID file that systemd is waiting for. Retry for up to 10 seconds.
ExecStartPost=/bin/bash -c 'for i in $(seq 1 10); do pid=$(pgrep -f "sbd: inquisitor" 2>/dev/null); if [ -n "$pid" ]; then echo "$pid" > /run/sbd.pid; exit 0; fi; sleep 1; done; echo "ERROR: sbd inquisitor not found"; exit 1'
