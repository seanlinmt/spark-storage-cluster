# Systemd drop-in override for sbd.service
# Fixes boot-time SBD failures in NVMe-oF cluster:
#
# 1. Startup ordering: nvme-cluster-init blocks Corosync/Pacemaker for
#    up to 300s. Without this override, SBD's watchdog fires or times out
#    before the cluster stack is ready.
#
# 2. PID file race: SBD's inquisitor may not write /run/sbd.pid fast
#    enough for systemd. ExecStartPost retries for up to 30s to create
#    the PID file from the running inquisitor process.
#
# 3. Timeout: increase TimeoutStartSec to handle slow PID file creation.
#
# Install to: /etc/systemd/system/sbd.service.d/override.conf
# Then run:   sudo systemctl daemon-reload

[Unit]
# Don't start SBD watchdog until NVMe cluster storage is initialized.
After=nvme-cluster-init.service

[Service]
# Keep upstream Type=forking and -p flag, but add a fallback ExecStartPost
# that writes the PID file if SBD didn't do it fast enough.
ExecStart=
ExecStart=/usr/sbin/sbd $SBD_OPTS -p /run/sbd.pid watch

# Fallback: if SBD's -p didn't write the PID file, find the inquisitor
# process and write it ourselves. Retry for up to 30 seconds.
ExecStartPost=/bin/bash -c 'for i in $(seq 1 30); do if [ -f /run/sbd.pid ] && kill -0 $(cat /run/sbd.pid) 2>/dev/null; then exit 0; fi; pid=$(pgrep -f "sbd.*inquisitor" 2>/dev/null || pgrep -x sbd 2>/dev/null | tail -1); if [ -n "$pid" ]; then echo "$pid" > /run/sbd.pid; exit 0; fi; sleep 1; done; echo "ERROR: sbd inquisitor not found after 30s"; exit 1'

# Clear upstream ExecStop — $MAINPID works correctly with Type=forking + PIDFile
ExecStop=
ExecStop=/bin/bash -c 'if [ -f /run/sbd.pid ]; then kill -TERM $(cat /run/sbd.pid) 2>/dev/null; else killall -TERM sbd 2>/dev/null; fi'

# Allow enough time for SBD to fork and write the PID file
TimeoutStartSec=120
